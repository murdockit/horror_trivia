services:
  app:
    build: .
    ports:
      - "4040:4040"
    environment:
      - PORT=4040
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - PUBLIC_URL=${PUBLIC_URL}
    volumes:
      - ./db:/app/db
    restart: unless-stopped
